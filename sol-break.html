<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOL Breaker — SOL-Cade</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --sol-purple: #9945FF;
    --sol-green:  #14F195;
    --sol-cyan:   #00C2FF;
    --sol-pink:   #FF6FD8;
    --sol-dark:   #0A0A12;
    --sol-darker: #06060D;
    --sol-panel:  #0F0F1E;
    --sol-border: #1E1E38;
    --text:       #E0E0FF;
    --text-dim:   #5A5A8A;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width:100%; height:100%;
    background: var(--sol-darker);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    user-select: none;
  }

  /* CRT flicker */
  @keyframes crtFlicker {
    0%   { opacity:1; }
    3%   { opacity:0.97; }
    6%   { opacity:1; }
    50%  { opacity:0.985; }
    53%  { opacity:1; }
    92%  { opacity:0.99; }
    100% { opacity:1; }
  }

  body::before {
    content:'';
    position:fixed; inset:0;
    pointer-events:none;
    z-index:99;
    animation: crtFlicker 0.15s infinite;
    background: transparent;
  }

  body::after {
    content:'';
    position:fixed; inset:0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events:none;
    z-index:100;
  }

  #stars {
    position:fixed; inset:0;
    pointer-events:none;
    z-index:0;
  }

  #wrapper {
    position:relative;
    width:100vw; height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:1;
  }

  #hud {
    width:600px;
    max-width:100vw;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 16px;
    background: var(--sol-panel);
    border: 1px solid var(--sol-border);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
  }

  .hud-block { display:flex; flex-direction:column; gap:2px; }
  .hud-label { font-size:9px; letter-spacing:.15em; color:var(--text-dim); text-transform:uppercase; }
  .hud-value { font-family:'Orbitron',sans-serif; font-size:18px; font-weight:700; color:var(--sol-green); }
  .hud-value.cyan { color:var(--sol-cyan); }
  .hud-value.purple { color:var(--sol-purple); }

  .lives-dots { display:flex; gap:6px; align-items:center; }
  .life-dot {
    width:10px; height:10px;
    background:var(--sol-green);
    border-radius:50%;
  }
  .life-dot.dead { background:var(--sol-border); }

  #brand {
    font-family:'Orbitron',sans-serif;
    font-size:13px;
    font-weight:900;
    letter-spacing:.2em;
    color:var(--sol-purple);
    text-align:center;
  }
  #brand span { color:var(--sol-green); }

  #gameCanvas {
    display:block;
    width:600px;
    max-width:100vw;
    border: 1px solid var(--sol-border);
    background: var(--sol-dark);
    image-rendering: pixelated;
  }

  #footer {
    width:600px;
    max-width:100vw;
    padding:8px 16px;
    background: var(--sol-panel);
    border: 1px solid var(--sol-border);
    border-top: 1px solid var(--sol-border);
    border-radius: 0 0 6px 6px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .ctrl-hint { font-size:10px; color:var(--text-dim); letter-spacing:.08em; }
  .ctrl-hint span { color:var(--sol-cyan); }
  #credit-label { font-size:10px; color:var(--sol-green); letter-spacing:.15em; }
  #level-label { font-size:10px; color:var(--text-dim); letter-spacing:.1em; }
  #level-label em { color:var(--sol-pink); font-style:normal; }

  #overlay {
    position:absolute;
    top:0; left:0; right:0; bottom:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background: rgba(6,6,13,0.88);
    z-index:10;
    gap:12px;
    pointer-events:all;
    padding:24px;
  }
  #overlay.hidden { display:none; pointer-events:none; }

  .overlay-logo {
    font-family:'Orbitron',sans-serif;
    font-size:42px;
    font-weight:900;
    line-height:1;
    color:var(--sol-purple);
    text-shadow: 0 0 40px rgba(153,69,255,.6);
    letter-spacing:.05em;
  }
  .overlay-logo span { color:var(--sol-green); }

  .overlay-sub {
    font-size:12px;
    color:var(--text-dim);
    letter-spacing:.25em;
    text-transform:uppercase;
  }

  .overlay-score {
    font-family:'Orbitron',sans-serif;
    font-size:32px;
    font-weight:700;
    color:var(--sol-green);
    margin:4px 0 6px;
    line-height:1;
  }
  .overlay-score-label {
    font-size:10px;
    color:var(--text-dim);
    letter-spacing:.2em;
    text-transform:uppercase;
    margin:0 0 6px;
    line-height:1;
  }
  .overlay-hi {
    font-size:11px;
    color:var(--text-dim);
    letter-spacing:.15em;
    line-height:1;
    margin-top:2px;
  }
  .overlay-hi span { color:var(--sol-cyan); }

  #overlay-result {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:0;
    padding:16px 32px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(20,241,149,.15);
    border-radius:8px;
  }

  .brick-demo {
    display:flex; gap:6px; margin:10px 0;
    align-items:center; justify-content:center;
  }
  .demo-brick {
    width:36px; height:12px;
    border-radius:2px;
  }
  .demo-pts { font-size:9px; color:var(--text-dim); letter-spacing:.1em; white-space:nowrap; margin-left:6px; }

  .start-btn {
    margin-top:8px;
    padding:12px 40px;
    font-family:'Orbitron',sans-serif;
    font-size:13px;
    font-weight:700;
    letter-spacing:.2em;
    text-transform:uppercase;
    background:transparent;
    border:2px solid var(--sol-green);
    color:var(--sol-green);
    cursor:pointer;
    border-radius:4px;
    transition: background .15s, color .15s, box-shadow .15s;
    position:relative;
    overflow:hidden;
  }
  .start-btn:hover {
    background: var(--sol-green);
    color: var(--sol-dark);
    box-shadow: 0 0 24px rgba(20,241,149,.5);
  }
  .start-btn:active { transform:scale(.97); }

  .blink { animation: blink 1.2s step-end infinite; }
  @keyframes blink { 50%{opacity:0} }

  #mobile-controls {
    display:none;
    width:600px;
    max-width:100vw;
    padding:10px 16px;
    justify-content:space-between;
    gap:10px;
    margin-top:4px;
  }
  @media(max-width:640px){
    #mobile-controls { display:flex; }
    .ctrl-hint { display:none; }
  }
  .mob-btn {
    flex:1;
    padding:14px 0;
    background:var(--sol-panel);
    border:1px solid var(--sol-border);
    color:var(--sol-cyan);
    font-family:'Orbitron',sans-serif;
    font-size:18px;
    border-radius:6px;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
  }
  .mob-btn:active { background:var(--sol-border); }
  #mob-launch {
    background: rgba(153,69,255,.15);
    border-color:var(--sol-purple);
    color:var(--sol-purple);
    font-size:13px;
    letter-spacing:.1em;
  }

  #sound-toggle {
    position:fixed;
    top:12px; right:12px;
    z-index:101;
    background:var(--sol-panel);
    border:1px solid var(--sol-border);
    color:var(--text-dim);
    font-family:'Share Tech Mono',monospace;
    font-size:11px;
    padding:6px 10px;
    border-radius:4px;
    cursor:pointer;
    letter-spacing:.1em;
  }
  #sound-toggle:hover { border-color:var(--sol-cyan); color:var(--sol-cyan); }
</style>
</head>
<body>

<button id="sound-toggle">SFX: ON</button>

<canvas id="stars"></canvas>

<div id="wrapper">
  <div id="hud">
    <div class="hud-block">
      <span class="hud-label">Score</span>
      <span class="hud-value" id="hud-score">0</span>
    </div>
    <div id="brand">SOL<span>-CADE</span></div>
    <div class="hud-block" style="align-items:flex-end">
      <span class="hud-label">Hi-Score</span>
      <span class="hud-value cyan" id="hud-hi">0</span>
    </div>
  </div>

  <div style="position:relative; line-height:0;">
    <canvas id="gameCanvas" width="600" height="500"></canvas>

    <div id="overlay">
      <div class="overlay-logo">SOL<span>Breaker</span></div>
      <div class="overlay-sub">SOL-Cade Alpha</div>
      <div class="brick-demo" id="demo-bricks"></div>
      <div id="overlay-result" style="display:none; text-align:center;">
        <div class="overlay-score-label">Final Score</div>
        <div class="overlay-score" id="overlay-score-val">0</div>
        <div class="overlay-hi" id="overlay-hi-val" style="margin-top:8px;"></div>
      </div>
      <button class="start-btn blink" id="startBtn">INSERT COIN</button>
      <div class="ctrl-hint" style="font-size:10px; color:var(--text-dim);">
        <span style="color:var(--sol-cyan)">&larr; &rarr;</span> Move &nbsp;
        <span style="color:var(--sol-purple)">SPACE</span> Launch &nbsp;
        <span style="color:var(--text-dim)">P</span> Pause
      </div>
    </div>
  </div>

  <div id="footer">
    <div class="ctrl-hint">
      <span>&larr; &rarr;</span> MOVE &nbsp; <span>SPACE</span> LAUNCH &nbsp; <span style="color:var(--text-dim)">P</span> PAUSE
    </div>
    <div id="credit-label">CREDIT 0</div>
    <div id="level-label">LEVEL <em id="level-num">&mdash;</em></div>
    <div class="hud-block" style="align-items:flex-end">
      <span class="hud-label">Lives</span>
      <div class="lives-dots" id="lives-display"></div>
    </div>
  </div>

  <div id="mobile-controls">
    <button class="mob-btn" id="mob-left">&laquo;</button>
    <button class="mob-btn" id="mob-launch">LAUNCH</button>
    <button class="mob-btn" id="mob-right">&raquo;</button>
  </div>
</div>

<script>
// ── Star field ─────────────────────────────────────────────────────
(function(){
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  c.width = window.innerWidth; c.height = window.innerHeight;
  const stars = Array.from({length:200},()=>({
    x:Math.random()*c.width, y:Math.random()*c.height,
    r:Math.random()*1.2+.2, a:Math.random()
  }));
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a += .003; if(s.a>1) s.a=0;
      ctx.globalAlpha = .3+Math.sin(s.a*Math.PI)*.4;
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
  window.addEventListener('resize',()=>{ c.width=window.innerWidth; c.height=window.innerHeight; });
})();

// ── Sound Engine (Web Audio API) ──────────────────────────────────
const SFX = (function(){
  let actx = null;
  let enabled = true;

  function ensureCtx(){
    if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if(actx.state === 'suspended') actx.resume();
    return actx;
  }

  function paddleHit(hitPos){
    // hitPos: -1 to 1, varies pitch
    if(!enabled) return;
    const ctx = ensureCtx();
    const freq = 400 + hitPos * 200;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq*1.5, ctx.currentTime + 0.04);
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.06);
  }

  function brickBreak(row){
    // row 0=top (high pitch) to 5=bottom (low pitch)
    if(!enabled) return;
    const ctx = ensureCtx();
    const baseFreq = 800 - row * 100;
    const osc = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const gain = ctx.createGain();
    const gain2 = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(baseFreq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(baseFreq*0.5, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.08);
    // noise layer for crispness
    osc2.type = 'sawtooth';
    osc2.frequency.setValueAtTime(baseFreq*1.5, ctx.currentTime);
    osc2.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.06);
    gain2.gain.setValueAtTime(0.06, ctx.currentTime);
    gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
    osc2.connect(gain2); gain2.connect(ctx.destination);
    osc2.start(ctx.currentTime); osc2.stop(ctx.currentTime + 0.06);
  }

  function wallBounce(){
    if(!enabled) return;
    const ctx = ensureCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(300, ctx.currentTime);
    gain.gain.setValueAtTime(0.05, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.03);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.03);
  }

  function loseLife(){
    if(!enabled) return;
    const ctx = ensureCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(400, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.5);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.5);
  }

  function levelClear(){
    if(!enabled) return;
    const ctx = ensureCtx();
    const notes = [523, 659, 784, 1047, 1319];
    notes.forEach((freq,i)=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'square';
      const t = ctx.currentTime + i*0.08;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t+0.18);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t+0.18);
    });
  }

  function gameOverSfx(){
    if(!enabled) return;
    const ctx = ensureCtx();
    // descending warble
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const lfo = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(500, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 1.2);
    lfo.type = 'sine';
    lfo.frequency.setValueAtTime(8, ctx.currentTime);
    lfoGain.gain.setValueAtTime(40, ctx.currentTime);
    lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);
    osc.connect(gain); gain.connect(ctx.destination);
    lfo.start(ctx.currentTime); osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 1.2); lfo.stop(ctx.currentTime + 1.2);
  }

  function coinInsert(){
    if(!enabled) return;
    const ctx = ensureCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(988, ctx.currentTime);
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.15);
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(1319, ctx.currentTime + 0.1);
    gain2.gain.setValueAtTime(0.001, ctx.currentTime);
    gain2.gain.setValueAtTime(0.12, ctx.currentTime + 0.1);
    gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
    osc2.connect(gain2); gain2.connect(ctx.destination);
    osc2.start(ctx.currentTime + 0.1); osc2.stop(ctx.currentTime + 0.35);
  }

  function toggle(){
    enabled = !enabled;
    document.getElementById('sound-toggle').textContent = 'SFX: '+(enabled?'ON':'OFF');
  }

  function powerupCollect(){
    if(!enabled) return;
    const ctx = ensureCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(660, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.15);
  }

  return { paddleHit, brickBreak, wallBounce, loseLife, levelClear, gameOverSfx, coinInsert, powerupCollect, toggle, isEnabled:()=>enabled };
})();

document.getElementById('sound-toggle').addEventListener('click', SFX.toggle);

// ── Demo bricks on title screen ──────────────────────────────────
(function(){
  const container = document.getElementById('demo-bricks');
  const colors = ['#FF6FD8','#9945FF','#00C2FF','#14F195'];
  const pts = ['60','40','20','10'];
  colors.forEach((c,i)=>{
    const d = document.createElement('div');
    d.className = 'demo-brick';
    d.style.background = c;
    d.style.boxShadow = '0 0 6px '+c;
    container.appendChild(d);
    const p = document.createElement('span');
    p.className = 'demo-pts';
    p.textContent = pts[i]+'PTS';
    container.appendChild(p);
  });
})();

// ── Game Engine ────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 600, H = 500;

const C = {
  purple:'#9945FF', green:'#14F195', cyan:'#00C2FF',
  pink:'#FF6FD8', dark:'#0A0A12', white:'#E0E0FF'
};

const BRICK_ROWS = [
  { color:'#FF6FD8', pts:60 },
  { color:'#FF6FD8', pts:50 },
  { color:'#9945FF', pts:40 },
  { color:'#9945FF', pts:30 },
  { color:'#00C2FF', pts:20 },
  { color:'#14F195', pts:10 },
];

const BRICK_COLS = 8;
const BRICK_W = 62;
const BRICK_H = 16;
const BRICK_PAD = 6;
const BRICK_TOP = 60;
const BRICK_LEFT = (W - (BRICK_COLS * (BRICK_W + BRICK_PAD) - BRICK_PAD)) / 2;

const PADDLE_W = 80;
const PADDLE_H = 12;
const PADDLE_Y = H - 40;
const PADDLE_SPEED = 420;
const PADDLE_RADIUS = 5;

const BALL_R = 5;
const BALL_BASE_SPEED = 280;

let hiScore = parseInt(localStorage.getItem('solBreakHi')) || 0;
let state = 'idle', paused = false;
let score = 0, lives = 3, level = 1;
let paddle, ball, bricks, particles, ballTrail;
let balls = []; // multi-ball support
let powerups = [];
let paddleW = PADDLE_W; // current paddle width (can change via powerups)
let keys = {}, mobileLeft = false, mobileRight = false;
let animId, lastTime = 0;
let shakeX = 0, shakeY = 0, shakeDur = 0, shakeIntensity = 0;
let ballStuck = true;
let comboCount = 0, comboTimer = 0;
let hitCount = 0; // track hits for OG speed-up

const POWERUP_TYPES = [
  { type:'multi',  label:'M', color:'#9945FF', desc:'MULTI-BALL' },
  { type:'expand', label:'E', color:'#14F195', desc:'EXPAND' },
  { type:'slow',   label:'S', color:'#E0E0FF', desc:'SLOW' },
];
const POWERUP_CHANCE = 0.18;
const POWERUP_SPEED = 120;

// Attract mode
let attractMode = false;
let attractTimer = 0;
const ATTRACT_IDLE_TIME = 10;

function initBricks(){
  bricks = [];
  for(let r=0; r<BRICK_ROWS.length; r++){
    for(let c=0; c<BRICK_COLS; c++){
      bricks.push({
        x: BRICK_LEFT + c*(BRICK_W+BRICK_PAD),
        y: BRICK_TOP + r*(BRICK_H+BRICK_PAD),
        w: BRICK_W, h: BRICK_H,
        row: r, col: c,
        color: BRICK_ROWS[r].color,
        pts: BRICK_ROWS[r].pts,
        alive: true
      });
    }
  }
}

function resetBall(){
  ballStuck = true;
  ball = {
    x: paddle.x + paddleW/2,
    y: PADDLE_Y - BALL_R - 1,
    dx: 0, dy: 0,
    speed: BALL_BASE_SPEED + (level-1)*15,
    r: BALL_R
  };
  balls = [];
  ballTrail = [];
  hitCount = 0;
}

function launchBall(){
  if(!ballStuck) return;
  ballStuck = false;
  const angle = -Math.PI/2 + (Math.random()-0.5)*0.8; // roughly upward, random spread
  ball.dx = Math.cos(angle) * ball.speed;
  ball.dy = Math.sin(angle) * ball.speed;
}

function initGame(){
  score = 0;
  lives = 3;
  level = 1;
  particles = [];
  powerups = [];
  balls = [];
  comboCount = 0;
  comboTimer = 0;
  hitCount = 0;
  paddleW = PADDLE_W;
  paddle = { x: W/2 - paddleW/2 };
  initBricks();
  resetBall();
  updateHUD();
}

function nextLevel(){
  level++;
  initBricks();
  resetBall();
  powerups = [];
  paddleW = PADDLE_W;
  comboCount = 0;
  comboTimer = 0;
  updateHUD();
}

// ── Particles ────────────────────────────────────────────────────
function spawnParticles(x, y, color, count){
  for(let i=0; i<count; i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 60 + Math.random()*120;
    particles.push({
      x, y,
      dx: Math.cos(angle)*speed,
      dy: Math.sin(angle)*speed,
      life: 0.4 + Math.random()*0.3,
      maxLife: 0.4 + Math.random()*0.3,
      color,
      size: 1.5 + Math.random()*2.5
    });
  }
}

// ── Screen shake ──────────────────────────────────────────────────
function triggerShake(intensity, dur){
  shakeIntensity = intensity;
  shakeDur = dur;
}

// ── Update HUD ───────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('hud-score').textContent = score.toLocaleString();
  document.getElementById('hud-hi').textContent = Math.max(score, hiScore).toLocaleString();
  document.getElementById('level-num').textContent = level;
  const ld = document.getElementById('lives-display');
  ld.innerHTML = '';
  for(let i=0; i<3; i++){
    const d = document.createElement('div');
    d.className = 'life-dot' + (i>=lives?' dead':'');
    ld.appendChild(d);
  }
}

// ── Collision ────────────────────────────────────────────────────
function rectCircle(rx, ry, rw, rh, cx, cy, cr){
  const closestX = Math.max(rx, Math.min(cx, rx+rw));
  const closestY = Math.max(ry, Math.min(cy, ry+rh));
  const dx = cx - closestX;
  const dy = cy - closestY;
  return (dx*dx + dy*dy) < (cr*cr);
}

// ── Game loop ────────────────────────────────────────────────────
function update(dt){
  if(paused) return;

  // Paddle movement
  let pdx = 0;
  if(keys['ArrowLeft'] || keys['KeyA'] || mobileLeft) pdx = -1;
  if(keys['ArrowRight'] || keys['KeyD'] || mobileRight) pdx = 1;

  // Attract mode AI
  if(attractMode && !ballStuck){
    const targetX = ball.x - paddleW/2;
    if(paddle.x < targetX - 5) pdx = 1;
    else if(paddle.x > targetX + 5) pdx = -1;
    else pdx = 0;
  }

  paddle.x += pdx * PADDLE_SPEED * dt;
  paddle.x = Math.max(0, Math.min(W - paddleW, paddle.x));

  // Ball stuck to paddle
  if(ballStuck){
    ball.x = paddle.x + paddleW/2;
    ball.y = PADDLE_Y - BALL_R - 1;
    // Attract mode auto-launch
    if(attractMode){
      attractTimer += dt;
      if(attractTimer > 1.5){
        launchBall();
        attractTimer = 0;
      }
    }
    return;
  }

  // Combo timer
  if(comboTimer > 0){
    comboTimer -= dt;
    if(comboTimer <= 0) comboCount = 0;
  }

  // Ball trail
  ballTrail.push({x: ball.x, y: ball.y, life: 0.15});

  // Move ball
  ball.x += ball.dx * dt;
  ball.y += ball.dy * dt;

  // Wall collisions
  if(ball.x - ball.r <= 0){
    ball.x = ball.r;
    ball.dx = Math.abs(ball.dx);
    SFX.wallBounce();
  }
  if(ball.x + ball.r >= W){
    ball.x = W - ball.r;
    ball.dx = -Math.abs(ball.dx);
    SFX.wallBounce();
  }
  if(ball.y - ball.r <= 0){
    ball.y = ball.r;
    ball.dy = Math.abs(ball.dy);
    SFX.wallBounce();
  }

  // Ball falls off bottom
  if(ball.y - ball.r > H){
    lives--;
    updateHUD();
    if(lives <= 0){
      if(attractMode){
        // Restart attract
        initGame();
        state = 'playing';
        return;
      }
      SFX.loseLife();
      gameOver();
      return;
    }
    SFX.loseLife();
    resetBall();
    return;
  }

  // Paddle collision
  if(ball.dy > 0 &&
     ball.y + ball.r >= PADDLE_Y &&
     ball.y + ball.r <= PADDLE_Y + PADDLE_H + 4 &&
     ball.x >= paddle.x - ball.r &&
     ball.x <= paddle.x + paddleW + ball.r){
    // Where on paddle? -1 (left edge) to 1 (right edge)
    const hitPos = ((ball.x - paddle.x) / paddleW) * 2 - 1;
    const clampedHit = Math.max(-0.9, Math.min(0.9, hitPos));
    // Angle: -150 deg (left) to -30 deg (right)
    const angle = -Math.PI/2 + clampedHit * (Math.PI/3);
    ball.dx = Math.cos(angle) * ball.speed;
    ball.dy = Math.sin(angle) * ball.speed;
    ball.y = PADDLE_Y - ball.r - 1;
    SFX.paddleHit(clampedHit);
    triggerShake(2, 0.05);
  }

  // Brick collision
  for(let i=0; i<bricks.length; i++){
    const b = bricks[i];
    if(!b.alive) continue;
    if(rectCircle(b.x, b.y, b.w, b.h, ball.x, ball.y, ball.r)){
      b.alive = false;
      score += b.pts;

      // Combo
      comboCount++;
      comboTimer = 1.5;
      if(comboCount > 1){
        score += comboCount * 5; // combo bonus
      }

      // OG speed-up: every 4 hits, ball gets faster
      hitCount++;
      if(hitCount % 4 === 0){
        ball.speed = Math.min(ball.speed * 1.05, 600);
        const spd = ball.speed;
        const mag = Math.sqrt(ball.dx*ball.dx + ball.dy*ball.dy);
        ball.dx = (ball.dx/mag) * spd;
        ball.dy = (ball.dy/mag) * spd;
      }

      SFX.brickBreak(b.row);
      spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color, 8);

      // Power-up drop chance
      if(Math.random() < POWERUP_CHANCE){
        const ptype = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
        powerups.push({
          x: b.x + b.w/2,
          y: b.y + b.h/2,
          type: ptype.type,
          label: ptype.label,
          color: ptype.color,
          desc: ptype.desc
        });
      }

      // Determine bounce direction
      // Check which side the ball hit from
      const ballPrevX = ball.x - ball.dx * dt;
      const ballPrevY = ball.y - ball.dy * dt;

      // Horizontal penetration
      const overlapLeft = (ball.x + ball.r) - b.x;
      const overlapRight = (b.x + b.w) - (ball.x - ball.r);
      const overlapTop = (ball.y + ball.r) - b.y;
      const overlapBottom = (b.y + b.h) - (ball.y - ball.r);

      const minOverlapX = Math.min(overlapLeft, overlapRight);
      const minOverlapY = Math.min(overlapTop, overlapBottom);

      if(minOverlapX < minOverlapY){
        ball.dx = -ball.dx;
      } else {
        ball.dy = -ball.dy;
      }

      updateHUD();
      break; // one brick per frame
    }
  }

  // Check level clear
  if(bricks.every(b => !b.alive)){
    SFX.levelClear();
    nextLevel();
  }

  // Update power-ups (fall + collect)
  for(let i=powerups.length-1; i>=0; i--){
    const pu = powerups[i];
    pu.y += POWERUP_SPEED * dt;
    // Collect on paddle
    if(pu.y + 8 >= PADDLE_Y && pu.y - 8 <= PADDLE_Y + PADDLE_H &&
       pu.x >= paddle.x && pu.x <= paddle.x + paddleW){
      SFX.powerupCollect();
      applyPowerup(pu.type);
      spawnParticles(pu.x, pu.y, pu.color, 6);
      powerups.splice(i, 1);
      continue;
    }
    // Off screen
    if(pu.y > H + 10){
      powerups.splice(i, 1);
    }
  }

  // Update extra balls (multi-ball)
  for(let i=balls.length-1; i>=0; i--){
    const eb = balls[i];
    eb.x += eb.dx * dt;
    eb.y += eb.dy * dt;
    // Wall bounce
    if(eb.x - eb.r <= 0){ eb.x = eb.r; eb.dx = Math.abs(eb.dx); }
    if(eb.x + eb.r >= W){ eb.x = W - eb.r; eb.dx = -Math.abs(eb.dx); }
    if(eb.y - eb.r <= 0){ eb.y = eb.r; eb.dy = Math.abs(eb.dy); }
    // Fall off bottom — extra balls just die
    if(eb.y - eb.r > H){ balls.splice(i, 1); continue; }
    // Paddle bounce
    if(eb.dy > 0 && eb.y + eb.r >= PADDLE_Y && eb.y + eb.r <= PADDLE_Y + PADDLE_H + 4 &&
       eb.x >= paddle.x - eb.r && eb.x <= paddle.x + paddleW + eb.r){
      const hitPos = ((eb.x - paddle.x) / paddleW) * 2 - 1;
      const clampedHit = Math.max(-0.9, Math.min(0.9, hitPos));
      const angle = -Math.PI/2 + clampedHit * (Math.PI/3);
      eb.dx = Math.cos(angle) * eb.speed;
      eb.dy = Math.sin(angle) * eb.speed;
      eb.y = PADDLE_Y - eb.r - 1;
    }
    // Brick collision for extra balls
    for(let j=0; j<bricks.length; j++){
      const b = bricks[j];
      if(!b.alive) continue;
      if(rectCircle(b.x, b.y, b.w, b.h, eb.x, eb.y, eb.r)){
        b.alive = false;
        score += b.pts;
        SFX.brickBreak(b.row);
        spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color, 8);
        const overlapLeft = (eb.x + eb.r) - b.x;
        const overlapRight = (b.x + b.w) - (eb.x - eb.r);
        const overlapTop = (eb.y + eb.r) - b.y;
        const overlapBottom = (b.y + b.h) - (eb.y - eb.r);
        if(Math.min(overlapLeft, overlapRight) < Math.min(overlapTop, overlapBottom)){
          eb.dx = -eb.dx;
        } else {
          eb.dy = -eb.dy;
        }
        updateHUD();
        break;
      }
    }
    // Re-check level clear after extra ball brick hits
    if(bricks.every(b => !b.alive)){
      SFX.levelClear();
      nextLevel();
      break;
    }
  }

  // Update particles
  for(let i=particles.length-1; i>=0; i--){
    const p = particles[i];
    p.x += p.dx * dt;
    p.y += p.dy * dt;
    p.dy += 200 * dt; // gravity
    p.life -= dt;
    if(p.life <= 0) particles.splice(i, 1);
  }

  // Update ball trail
  for(let i=ballTrail.length-1; i>=0; i--){
    ballTrail[i].life -= dt;
    if(ballTrail[i].life <= 0) ballTrail.splice(i, 1);
  }

  // Power-up flash timer
  if(powerupFlashTimer > 0) powerupFlashTimer -= dt;

  // Screen shake
  if(shakeDur > 0){
    shakeDur -= dt;
    shakeX = (Math.random()-0.5) * shakeIntensity * 2;
    shakeY = (Math.random()-0.5) * shakeIntensity * 2;
  } else {
    shakeX = 0; shakeY = 0;
  }
}

let powerupFlash = '';
let powerupFlashTimer = 0;

function applyPowerup(type){
  if(type === 'multi'){
    for(let i=0; i<2; i++){
      const angle = -Math.PI/2 + (i === 0 ? -0.5 : 0.5);
      balls.push({
        x: ball.x, y: ball.y,
        dx: Math.cos(angle) * ball.speed,
        dy: Math.sin(angle) * ball.speed,
        speed: ball.speed,
        r: BALL_R
      });
    }
    powerupFlash = 'MULTI-BALL!';
  } else if(type === 'expand'){
    paddleW = Math.min(140, paddleW + 30);
    paddle.x = Math.min(paddle.x, W - paddleW);
    powerupFlash = 'EXPAND!';
  } else if(type === 'slow'){
    ball.speed = Math.max(180, ball.speed * 0.7);
    const mag = Math.sqrt(ball.dx*ball.dx + ball.dy*ball.dy);
    if(mag > 0){
      ball.dx = (ball.dx/mag) * ball.speed;
      ball.dy = (ball.dy/mag) * ball.speed;
    }
    balls.forEach(eb => {
      eb.speed = Math.max(180, eb.speed * 0.7);
      const m = Math.sqrt(eb.dx*eb.dx + eb.dy*eb.dy);
      if(m > 0){ eb.dx = (eb.dx/m) * eb.speed; eb.dy = (eb.dy/m) * eb.speed; }
    });
    powerupFlash = 'SLOW!';
  }
  powerupFlashTimer = 1.5;
}

function drawGame(){
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Draw bricks
  bricks.forEach(b => {
    if(!b.alive) return;
    // Glow
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 8;
    // Filled brick
    ctx.fillStyle = b.color;
    roundRect(ctx, b.x, b.y, b.w, b.h, 3);
    ctx.fill();
    // Inner highlight
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    roundRect(ctx, b.x+2, b.y+1, b.w-4, b.h/2-1, 2);
    ctx.fill();
    // Border
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    roundRect(ctx, b.x, b.y, b.w, b.h, 3);
    ctx.stroke();
  });
  ctx.shadowBlur = 0;

  // Draw paddle
  ctx.shadowColor = C.green;
  ctx.shadowBlur = 12;
  ctx.fillStyle = C.green;
  roundRect(ctx, paddle.x, PADDLE_Y, paddleW, PADDLE_H, PADDLE_RADIUS);
  ctx.fill();
  // Paddle highlight
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  roundRect(ctx, paddle.x+4, PADDLE_Y+2, paddleW-8, PADDLE_H/2-1, 3);
  ctx.fill();

  // Draw power-ups (falling capsules)
  powerups.forEach(pu => {
    ctx.shadowColor = pu.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = pu.color;
    roundRect(ctx, pu.x-12, pu.y-8, 24, 16, 8);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#000';
    ctx.font = 'bold 10px Orbitron, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(pu.label, pu.x, pu.y);
  });
  ctx.shadowBlur = 0;
  ctx.textBaseline = 'alphabetic';

  // Draw extra balls
  balls.forEach(eb => {
    ctx.shadowColor = C.pink;
    ctx.shadowBlur = 12;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(eb.x, eb.y, eb.r, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    const g = ctx.createRadialGradient(eb.x-1, eb.y-1, 0, eb.x, eb.y, eb.r);
    g.addColorStop(0, 'rgba(255,255,255,0.5)');
    g.addColorStop(1, 'rgba(255,111,216,0.2)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(eb.x, eb.y, eb.r, 0, Math.PI*2);
    ctx.fill();
  });

  // Draw ball trail
  ballTrail.forEach(t => {
    const alpha = (t.life / 0.15) * 0.3;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = C.cyan;
    ctx.beginPath();
    ctx.arc(t.x, t.y, ball.r * 0.7, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Draw ball
  ctx.shadowColor = C.cyan;
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fill();
  // Ball inner glow
  ctx.shadowBlur = 0;
  const ballGrad = ctx.createRadialGradient(ball.x-1, ball.y-1, 0, ball.x, ball.y, ball.r);
  ballGrad.addColorStop(0, 'rgba(255,255,255,0.6)');
  ballGrad.addColorStop(1, 'rgba(0,194,255,0.1)');
  ctx.fillStyle = ballGrad;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fill();

  // Draw particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;

  // Combo text
  if(comboCount > 1 && comboTimer > 0){
    ctx.globalAlpha = Math.min(1, comboTimer);
    ctx.font = '700 16px Orbitron, sans-serif';
    ctx.fillStyle = C.pink;
    ctx.textAlign = 'center';
    ctx.shadowColor = C.pink;
    ctx.shadowBlur = 10;
    ctx.fillText('COMBO x'+comboCount+' +'+comboCount*5, W/2, H/2 + 60);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // Power-up flash text
  if(powerupFlashTimer > 0){
    ctx.globalAlpha = Math.min(1, powerupFlashTimer);
    ctx.font = '700 18px Orbitron, sans-serif';
    ctx.fillStyle = C.green;
    ctx.textAlign = 'center';
    ctx.shadowColor = C.green;
    ctx.shadowBlur = 15;
    ctx.fillText(powerupFlash, W/2, H/2 + 40);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // Paused overlay
  if(paused){
    ctx.fillStyle = 'rgba(6,6,13,0.6)';
    ctx.fillRect(0,0,W,H);
    ctx.font = '900 28px Orbitron, sans-serif';
    ctx.fillStyle = C.purple;
    ctx.textAlign = 'center';
    ctx.shadowColor = C.purple;
    ctx.shadowBlur = 20;
    ctx.fillText('PAUSED', W/2, H/2);
    ctx.shadowBlur = 0;
    ctx.font = '12px "Share Tech Mono", monospace';
    ctx.fillStyle = '#5A5A8A';
    ctx.fillText('PRESS P TO RESUME', W/2, H/2+30);
  }

  // Ball stuck indicator
  if(ballStuck && state === 'playing' && !attractMode){
    ctx.font = '11px "Share Tech Mono", monospace';
    ctx.fillStyle = C.cyan;
    ctx.textAlign = 'center';
    ctx.globalAlpha = 0.5 + Math.sin(Date.now()*0.005)*0.5;
    ctx.fillText('PRESS SPACE TO LAUNCH', W/2, PADDLE_Y + 36);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function gameLoop(ts){
  animId = requestAnimationFrame(gameLoop);
  const dt = Math.min((ts - lastTime)/1000, 0.05);
  lastTime = ts;
  if(state === 'playing'){
    update(dt);
    drawGame();
  }
}

function startGame(){
  attractMode = false;
  attractTimer = 0;
  initGame();
  state = 'playing';
  SFX.coinInsert();
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('credit-label').textContent = 'CREDIT 1';
  lastTime = performance.now();
  if(!animId) animId = requestAnimationFrame(gameLoop);
}

function gameOver(){
  state = 'gameover';
  SFX.gameOverSfx();
  if(score > hiScore){
    hiScore = score;
    localStorage.setItem('solBreakHi', hiScore);
  }
  updateHUD();
  showGameOver();
}

function showGameOver(){
  const overlay = document.getElementById('overlay');
  overlay.classList.remove('hidden');
  const result = document.getElementById('overlay-result');
  result.style.display = 'flex';
  document.getElementById('overlay-score-val').textContent = score.toLocaleString();
  const hiEl = document.getElementById('overlay-hi-val');
  hiEl.innerHTML = 'HI-SCORE <span>'+hiScore.toLocaleString()+'</span>';
  if(score >= hiScore && score > 0){
    hiEl.innerHTML = 'NEW HI-SCORE! <span>'+hiScore.toLocaleString()+'</span>';
  }
  document.getElementById('startBtn').textContent = 'PLAY AGAIN';
  document.getElementById('credit-label').textContent = 'CREDIT 0';
  // Start attract idle timer
  attractTimer = 0;
  idleTimer = 0;
}

// ── Attract mode ─────────────────────────────────────────────────
let idleTimer = 0;
function checkIdle(dt){
  if(state !== 'idle' && state !== 'gameover') return;
  idleTimer += dt;
  if(idleTimer > ATTRACT_IDLE_TIME && !attractMode){
    startAttract();
  }
}

function startAttract(){
  attractMode = true;
  attractTimer = 0;
  initGame();
  state = 'playing';
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('credit-label').textContent = 'INSERT COIN';
  lastTime = performance.now();
  if(!animId) animId = requestAnimationFrame(gameLoop);
}

// Idle check timer
setInterval(()=>{
  if(state === 'idle' || state === 'gameover'){
    checkIdle(0.5);
  }
}, 500);

// ── Input ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  idleTimer = 0;

  if(attractMode && state === 'playing'){
    // Any key stops attract, starts real game
    attractMode = false;
    startGame();
    return;
  }

  if(e.code === 'Space'){
    e.preventDefault();
    if(state === 'playing' && ballStuck){
      launchBall();
    }
  }
  if(e.code === 'KeyP' && state === 'playing' && !attractMode){
    paused = !paused;
  }
});

document.addEventListener('keyup', e => {
  keys[e.code] = false;
});

// Start button
document.getElementById('startBtn').addEventListener('click', () => {
  if(attractMode){
    attractMode = false;
  }
  startGame();
});

// Mobile controls
const mobLeft = document.getElementById('mob-left');
const mobRight = document.getElementById('mob-right');
const mobLaunch = document.getElementById('mob-launch');

function setupMobileBtn(el, setter){
  el.addEventListener('touchstart', e => { e.preventDefault(); setter(true); idleTimer=0; });
  el.addEventListener('touchend', e => { e.preventDefault(); setter(false); });
  el.addEventListener('touchcancel', e => { setter(false); });
  el.addEventListener('mousedown', e => { setter(true); idleTimer=0; });
  el.addEventListener('mouseup', e => { setter(false); });
  el.addEventListener('mouseleave', e => { setter(false); });
}

setupMobileBtn(mobLeft, v => mobileLeft = v);
setupMobileBtn(mobRight, v => mobileRight = v);

mobLaunch.addEventListener('touchstart', e => {
  e.preventDefault();
  idleTimer = 0;
  if(attractMode && state === 'playing'){
    attractMode = false;
    startGame();
    return;
  }
  if(state !== 'playing') return;
  if(ballStuck) launchBall();
});
mobLaunch.addEventListener('click', e => {
  idleTimer = 0;
  if(attractMode && state === 'playing'){
    attractMode = false;
    startGame();
    return;
  }
  if(state !== 'playing') return;
  if(ballStuck) launchBall();
});

// ── Init ─────────────────────────────────────────────────────────
updateHUD();

// Start the render loop even in idle for attract mode to work
lastTime = performance.now();
animId = requestAnimationFrame(gameLoop);
</script>
