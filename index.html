<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOL-Cade — Retro Arcade on Solana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #06060D;
      color: #E0E0FF;
      font-family: 'Press Start 2P', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* CRT scanlines */
    body::after {
      content:'';
      position:fixed; inset:0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events:none;
      z-index:100;
    }

    /* Stars */
    .stars {
      position: fixed; inset: 0;
      z-index: 0;
    }
    .stars canvas { width: 100%; height: 100%; }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 12vw, 9rem);
      color: #9945FF;
      letter-spacing: 0.08em;
      text-shadow: 0 0 30px rgba(153,69,255,0.5), 0 0 60px rgba(153,69,255,0.2);
      line-height: 1;
    }

    .tagline {
      font-size: clamp(0.5rem, 1.5vw, 0.8rem);
      margin-top: 8px;
      color: #14F195;
      text-shadow: 0 0 10px rgba(20,241,149,0.4);
      letter-spacing: 0.2em;
    }

    .arcade-floor {
      margin-top: 50px;
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: center;
      max-width: 900px;
    }

    .cabinet {
      width: 220px;
      background: #0F0F1E;
      border: 2px solid #1E1E38;
      border-radius: 10px;
      padding: 0;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.3s, box-shadow 0.3s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .cabinet:hover {
      transform: translateY(-6px);
      border-color: #9945FF;
      box-shadow: 0 8px 30px rgba(153,69,255,0.3), 0 0 15px rgba(153,69,255,0.15);
    }

    .cabinet-screen {
      height: 160px;
      background: #0A0A12;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .cabinet-screen .game-preview {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 900;
      text-align: center;
      line-height: 1.2;
    }

    .cabinet-info {
      padding: 14px;
      text-align: center;
    }

    .cabinet-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #14F195;
      margin-bottom: 6px;
    }

    .cabinet-genre {
      font-size: 7px;
      color: #5A5A8A;
      letter-spacing: 0.15em;
    }

    .cabinet-status {
      margin-top: 8px;
      font-size: 7px;
      padding: 3px 8px;
      border-radius: 3px;
      display: inline-block;
    }
    .status-live {
      background: rgba(20,241,149,0.15);
      color: #14F195;
      border: 1px solid rgba(20,241,149,0.3);
    }
    .status-soon {
      background: rgba(153,69,255,0.15);
      color: #9945FF;
      border: 1px solid rgba(153,69,255,0.3);
    }

    /* Invaders preview animation */
    .invader-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 4px;
    }
    .invader-dot {
      width: 8px; height: 8px;
      border-radius: 2px;
      animation: invaderBob 1.2s ease-in-out infinite;
    }
    .invader-dot:nth-child(odd) { animation-delay: 0.15s; }

    @keyframes invaderBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .footer {
      margin-top: 60px;
      text-align: center;
    }

    .insert-coin {
      font-size: 0.6rem;
      color: #5A5A8A;
      animation: blink 1.2s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .sol-badge {
      margin-top: 20px;
      font-size: 7px;
      color: #333;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="stars"><canvas id="starfield"></canvas></div>

  <div class="content">
    <h1>SOL-CADE</h1>
    <p class="tagline">RETRO ARCADE ON SOLANA</p>

    <div class="arcade-floor">

      <a href="sol-invaders.html" class="cabinet">
        <div class="cabinet-screen">
          <div class="game-preview">
            <div class="invader-row">
              <div class="invader-dot" style="background:#FF6FD8"></div>
              <div class="invader-dot" style="background:#FF6FD8"></div>
              <div class="invader-dot" style="background:#FF6FD8"></div>
              <div class="invader-dot" style="background:#FF6FD8"></div>
              <div class="invader-dot" style="background:#FF6FD8"></div>
            </div>
            <div class="invader-row">
              <div class="invader-dot" style="background:#00C2FF"></div>
              <div class="invader-dot" style="background:#00C2FF"></div>
              <div class="invader-dot" style="background:#00C2FF"></div>
              <div class="invader-dot" style="background:#00C2FF"></div>
              <div class="invader-dot" style="background:#00C2FF"></div>
            </div>
            <div class="invader-row">
              <div class="invader-dot" style="background:#14F195"></div>
              <div class="invader-dot" style="background:#14F195"></div>
              <div class="invader-dot" style="background:#14F195"></div>
              <div class="invader-dot" style="background:#14F195"></div>
              <div class="invader-dot" style="background:#14F195"></div>
            </div>
            <div style="margin-top:10px;font-size:10px;color:#14F195;">▲</div>
          </div>
        </div>
        <div class="cabinet-info">
          <div class="cabinet-title">SOL INVADERS</div>
          <div class="cabinet-genre">FIXED SHOOTER</div>
          <span class="cabinet-status status-live">PLAY NOW</span>
        </div>
      </a>

      <div class="cabinet" style="cursor:default;opacity:0.5;">
        <div class="cabinet-screen">
          <div class="game-preview" style="font-size:36px;color:#9945FF;">?</div>
        </div>
        <div class="cabinet-info">
          <div class="cabinet-title">SOL DEFENDER</div>
          <div class="cabinet-genre">SCROLLING SHOOTER</div>
          <span class="cabinet-status status-soon">COMING SOON</span>
        </div>
      </div>

      <div class="cabinet" style="cursor:default;opacity:0.5;">
        <div class="cabinet-screen">
          <div class="game-preview" style="font-size:36px;color:#9945FF;">?</div>
        </div>
        <div class="cabinet-info">
          <div class="cabinet-title">SOL CENTIPEDE</div>
          <div class="cabinet-genre">TRACKBALL SHOOTER</div>
          <span class="cabinet-status status-soon">COMING SOON</span>
        </div>
      </div>

    </div>

    <div class="footer">
      <p class="insert-coin">SELECT A CABINET TO PLAY</p>
      <p class="sol-badge">POWERED BY SOLANA</p>
    </div>
  </div>

  <script>
    // Starfield
    const c = document.getElementById('starfield');
    const x = c.getContext('2d');
    function resize(){ c.width=window.innerWidth; c.height=window.innerHeight; }
    resize(); window.addEventListener('resize', resize);
    const stars = Array.from({length:120}, ()=>({
      x: Math.random()*2000, y: Math.random()*2000,
      r: 0.3+Math.random()*1.2,
      a: 0.3+Math.random()*0.7,
      s: 0.2+Math.random()*0.5
    }));
    function drawStars(){
      x.clearRect(0,0,c.width,c.height);
      const t = Date.now()*0.001;
      stars.forEach(s=>{
        const flicker = s.a + Math.sin(t*s.s+s.x)*0.15;
        x.fillStyle=`rgba(200,200,255,${Math.max(0.1,flicker)})`;
        x.beginPath();
        x.arc(s.x%c.width, s.y%c.height, s.r, 0, Math.PI*2);
        x.fill();
      });
      requestAnimationFrame(drawStars);
    }
    drawStars();
  </script>
</body>
</html>
