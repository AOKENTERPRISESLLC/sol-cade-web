<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RUGGED! — A Web3 De-Rug Strategy Simulator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --red: #cc0000;
  --cream: #e8e0d0;
  --muted: #a0998a;
  --green: #2ecc40;
  --font: 'Courier New', Courier, monospace;
}

html, body {
  background: var(--bg);
  color: var(--cream);
  font-family: var(--font);
  font-size: 16px;
  line-height: 1.5;
  height: 100%;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* Noise overlay */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 600px;
  margin: 0 auto;
  position: relative;
}

/* Ticker */
#ticker {
  background: var(--red);
  color: var(--bg);
  font-size: 12px;
  font-weight: bold;
  white-space: nowrap;
  overflow: hidden;
  padding: 4px 0;
  flex-shrink: 0;
  letter-spacing: 1px;
  position: relative;
  z-index: 10;
}
#ticker-inner {
  display: inline-block;
  animation: scroll-ticker 30s linear infinite;
}
@keyframes scroll-ticker {
  0% { transform: translateX(100vw); }
  100% { transform: translateX(-100%); }
}

/* HUD */
#hud {
  display: none;
  flex-shrink: 0;
  background: #111;
  border-bottom: 1px solid #222;
  padding: 8px 12px;
  font-size: 11px;
  z-index: 10;
}
#hud.visible { display: block; }

.hud-row {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 4px;
}
.hud-row:last-child { margin-bottom: 0; }

.hud-stat { flex: 1; }
.hud-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
.hud-bar-wrap {
  background: #222;
  height: 8px;
  border-radius: 2px;
  overflow: hidden;
  margin-top: 2px;
}
.hud-bar {
  height: 100%;
  border-radius: 2px;
  transition: width 0.8s ease;
}
.hud-bar.hope { background: var(--green); }
.hud-bar.burnout { background: var(--red); }
.hud-val { color: var(--cream); font-size: 12px; margin-top: 1px; }

/* Content area */
#content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  scroll-behavior: smooth;
}
#content::-webkit-scrollbar { width: 4px; }
#content::-webkit-scrollbar-track { background: transparent; }
#content::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

.log-entry {
  margin-bottom: 16px;
}
.log-entry.dimmed {
  opacity: 0.35;
}

.narrative {
  margin-bottom: 12px;
  white-space: pre-wrap;
}
.narrative .cursor {
  display: inline-block;
  width: 8px;
  height: 14px;
  background: var(--cream);
  animation: blink 0.7s step-end infinite;
  vertical-align: text-bottom;
  margin-left: 2px;
}
@keyframes blink {
  50% { opacity: 0; }
}

/* Title screen */
#title-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  text-align: center;
  padding: 20px;
}
#title-screen h1 {
  font-size: 48px;
  color: var(--red);
  text-shadow: 0 0 20px rgba(204,0,0,0.6), 0 0 40px rgba(204,0,0,0.3);
  letter-spacing: 6px;
  margin-bottom: 8px;
}
#title-screen .subtitle {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 40px;
  letter-spacing: 2px;
}

/* Buttons */
.btn {
  display: block;
  width: 100%;
  background: transparent;
  border: 1px solid var(--red);
  color: var(--cream);
  font-family: var(--font);
  font-size: 14px;
  padding: 14px 16px;
  margin-bottom: 8px;
  text-align: left;
  cursor: pointer;
  min-height: 44px;
  transition: background 0.15s, border-color 0.15s;
  line-height: 1.4;
}
.btn:hover, .btn:focus {
  background: rgba(204,0,0,0.15);
  border-color: #ff2222;
  outline: none;
}
.btn:active {
  background: rgba(204,0,0,0.3);
}

.btn-start {
  width: auto;
  padding: 14px 48px;
  text-align: center;
  font-size: 18px;
  letter-spacing: 4px;
  text-transform: uppercase;
}

.btn-label {
  color: var(--cream);
  font-weight: bold;
  margin-bottom: 2px;
}
.btn-desc {
  color: var(--muted);
  font-size: 12px;
}

/* Stat change indicators */
.stat-change {
  font-size: 12px;
  margin: 2px 0;
}
.stat-change.pos { color: var(--green); }
.stat-change.neg { color: var(--red); }

/* Profile card */
.profile-card {
  border: 1px solid #333;
  padding: 16px;
  margin: 16px 0;
}
.profile-card h3 {
  color: var(--red);
  font-size: 14px;
  letter-spacing: 2px;
  margin-bottom: 12px;
  text-transform: uppercase;
}
.profile-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 4px;
  font-size: 13px;
}
.profile-row .label { color: var(--muted); }
.profile-row .value { color: var(--cream); }

/* Decision prompt */
.decision-prompt {
  color: var(--red);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
  margin-top: 16px;
}

/* End screen */
.end-title {
  font-size: 24px;
  color: var(--red);
  text-shadow: 0 0 15px rgba(204,0,0,0.4);
  text-align: center;
  letter-spacing: 3px;
  margin: 24px 0 8px;
}
.end-subtitle {
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 24px;
  letter-spacing: 2px;
}

.separator {
  border: none;
  border-top: 1px solid #222;
  margin: 16px 0;
}
</style>
</head>
<body>
<div id="app">
  <div id="ticker"><span id="ticker-inner"></span></div>
  <div id="hud">
    <div class="hud-row">
      <div class="hud-stat">
        <div class="hud-label">Hope</div>
        <div class="hud-bar-wrap"><div class="hud-bar hope" id="hud-hope-bar" style="width:50%"></div></div>
        <div class="hud-val" id="hud-hope-val">50%</div>
      </div>
      <div class="hud-stat">
        <div class="hud-label">Burnout</div>
        <div class="hud-bar-wrap"><div class="hud-bar burnout" id="hud-burnout-bar" style="width:10%"></div></div>
        <div class="hud-val" id="hud-burnout-val">10%</div>
      </div>
    </div>
    <div class="hud-row">
      <div class="hud-stat">
        <div class="hud-label">Treasury</div>
        <div class="hud-val" id="hud-treasury">0.50 SOL</div>
      </div>
      <div class="hud-stat">
        <div class="hud-label">Holders</div>
        <div class="hud-val" id="hud-holders">12</div>
      </div>
      <div class="hud-stat">
        <div class="hud-label">Wallet</div>
        <div class="hud-val" id="hud-wallet">0.50 SOL</div>
      </div>
      <div class="hud-stat">
        <div class="hud-label">Time</div>
        <div class="hud-val" id="hud-time">Hour 0</div>
      </div>
    </div>
  </div>
  <div id="content"></div>
</div>

<script>
// ============================================================
// RUGGED! — A Web3 De-Rug Strategy Simulator
// ============================================================

const $ = id => document.getElementById(id);
const content = $('content');

// --- Audio ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playClick() {
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = 600;
    g.gain.value = 0.03;
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    o.stop(audioCtx.currentTime + 0.1);
  } catch(e) {}
}

// --- Game State ---
let gs = {
  phase: 'title',
  project: '',
  theme: '',
  stats: {
    hope: 50,
    burnout: 10,
    treasury: 0.5,
    wallet: 0.5,
    holders: 12,
    hype: 0,
    trust: 0,
    rep: 0,
    control: 100,
    hopeBuffer: 0,
    burnoutResist: 0,
    mysteryBonus: false,
    socialPower: 0,
    feeRedirectPending: false,
    fudActive: false,
    whaleCoLead: false,
    trauma: 'low'
  },
  time: { phase: 'hour', value: 0 },
  history: [],
  tickerMode: 'pre'
};

// --- Save / Load ---
function saveGame() {
  try { localStorage.setItem('rugged_save', JSON.stringify(gs)); } catch(e) {}
}
function loadGame() {
  try {
    const d = localStorage.getItem('rugged_save');
    if (d) { gs = JSON.parse(d); return true; }
  } catch(e) {}
  return false;
}

// --- Ticker ---
const tickerMessages = {
  pre: "gm... floor is lava... wen utility... probably nothing... LFG... ser this is a Wendy's... ngmi... wagmi... wen moon... DYOR... not financial advice...",
  chaos: "FLOOR DROPPING... whale watching... FUD levels critical... diamond hands only... ngmi energy detected... trust no dev... liquidity evaporating... paperhands exit...",
  good: "FLOOR RISING... new holders incoming... vibes immaculate... wagmi... based community... CT is watching... momentum building... LFG...",
  general: "NOT FINANCIAL ADVICE... DYOR... trust the process... wen moon... CT never sleeps... gm... probably something... the art speaks..."
};

function setTicker(mode) {
  gs.tickerMode = mode;
  const text = tickerMessages[mode] || tickerMessages.general;
  $('ticker-inner').textContent = '  ' + text.repeat(3) + '  ';
}
setTicker('pre');

// --- HUD ---
function updateHUD() {
  const s = gs.stats;
  const hope = Math.max(0, Math.min(100, s.hope));
  const burnout = Math.max(0, Math.min(100, s.burnout));
  $('hud-hope-bar').style.width = hope + '%';
  $('hud-hope-val').textContent = hope + '%';
  $('hud-burnout-bar').style.width = burnout + '%';
  $('hud-burnout-val').textContent = burnout + '%';
  $('hud-treasury').textContent = s.treasury.toFixed(2) + ' SOL';
  $('hud-holders').textContent = s.holders;
  $('hud-wallet').textContent = s.wallet.toFixed(2) + ' SOL';
  const t = gs.time;
  let timeStr = 'Hour 0';
  if (t.phase === 'hour') timeStr = 'Hour ' + t.value;
  else if (t.phase === 'day') timeStr = 'Day ' + t.value;
  else if (t.phase === 'week') timeStr = 'Week ' + t.value;
  $('hud-time').textContent = timeStr;
}

function showHUD() {
  $('hud').classList.add('visible');
  updateHUD();
}
function hideHUD() {
  $('hud').classList.remove('visible');
}

// --- Typewriter ---
function typewrite(el, text, speed = 30) {
  return new Promise(resolve => {
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    el.textContent = '';
    el.appendChild(cursor);
    function tick() {
      if (i < text.length) {
        cursor.before(text[i]);
        i++;
        setTimeout(tick, speed);
      } else {
        cursor.remove();
        resolve();
      }
    }
    tick();
  });
}

// --- Content helpers ---
function dimPrevious() {
  content.querySelectorAll('.log-entry:not(.dimmed)').forEach(el => {
    el.classList.add('dimmed');
  });
}

function scrollToBottom() {
  setTimeout(() => { content.scrollTop = content.scrollHeight; }, 50);
}

function addEntry() {
  const div = document.createElement('div');
  div.className = 'log-entry';
  content.appendChild(div);
  scrollToBottom();
  return div;
}

async function showNarrative(text, speed = 30) {
  const entry = addEntry();
  const p = document.createElement('div');
  p.className = 'narrative';
  entry.appendChild(p);
  await typewrite(p, text, speed);
  scrollToBottom();
  return entry;
}

async function showLines(lines, pause = 600, speed = 25) {
  for (const line of lines) {
    await showNarrative(line, speed);
    await delay(pause);
  }
}

function delay(ms) {
  return new Promise(r => setTimeout(r, ms));
}

function showStatChanges(changes, entry) {
  if (!entry) entry = addEntry();
  const wrap = document.createElement('div');
  wrap.style.marginTop = '8px';
  changes.forEach(c => {
    const div = document.createElement('div');
    div.className = 'stat-change ' + (c.val > 0 ? 'pos' : 'neg');
    div.textContent = c.label + ': ' + (c.val > 0 ? '+' : '') + c.val + (c.suffix || '');
    wrap.appendChild(div);
  });
  entry.appendChild(wrap);
  scrollToBottom();
}

function applyStats(changes) {
  const display = [];
  const nameMap = {
    hope: 'Community Hope', burnout: 'Burnout', treasury: 'Treasury',
    holders: 'Holders', hype: 'Hype', trust: 'Trust', rep: 'Rep',
    wallet: 'Your Wallet', control: 'Control', hopeBuffer: 'Hope Buffer',
    socialPower: 'Social Power', burnoutResist: 'Burnout Resistance'
  };
  for (const [k, v] of Object.entries(changes)) {
    if (typeof v === 'number' && v !== 0) {
      gs.stats[k] = (gs.stats[k] || 0) + v;
      display.push({
        label: nameMap[k] || k,
        val: v,
        suffix: k === 'treasury' || k === 'wallet' ? ' SOL' : (k === 'hope' || k === 'burnout' ? '%' : '')
      });
    } else if (typeof v === 'boolean') {
      gs.stats[k] = v;
    }
  }
  // Clamp
  gs.stats.hope = Math.max(0, Math.min(100, gs.stats.hope));
  gs.stats.burnout = Math.max(0, Math.min(100, gs.stats.burnout));
  gs.stats.holders = Math.max(0, gs.stats.holders);
  gs.stats.treasury = Math.max(0, gs.stats.treasury);
  gs.stats.wallet = Math.max(0, gs.stats.wallet);
  updateHUD();
  return display;
}

// --- Decision UI ---
function showDecision(prompt, options) {
  return new Promise(resolve => {
    const entry = addEntry();
    const label = document.createElement('div');
    label.className = 'decision-prompt';
    label.textContent = prompt;
    entry.appendChild(label);
    options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'btn';
      const lbl = document.createElement('div');
      lbl.className = 'btn-label';
      lbl.textContent = opt.label;
      btn.appendChild(lbl);
      if (opt.desc) {
        const desc = document.createElement('div');
        desc.className = 'btn-desc';
        desc.textContent = opt.desc;
        btn.appendChild(desc);
      }
      btn.onclick = () => {
        playClick();
        // Disable all
        entry.querySelectorAll('.btn').forEach(b => {
          b.disabled = true;
          b.style.opacity = '0.3';
          b.style.cursor = 'default';
        });
        btn.style.opacity = '1';
        btn.style.borderColor = '#2ecc40';
        resolve(i);
      };
      entry.appendChild(btn);
    });
    scrollToBottom();
  });
}

function showButton(text, cls = '') {
  return new Promise(resolve => {
    const entry = addEntry();
    const btn = document.createElement('button');
    btn.className = 'btn btn-start ' + cls;
    btn.textContent = text;
    btn.onclick = () => {
      playClick();
      btn.disabled = true;
      btn.style.opacity = '0.3';
      resolve();
    };
    entry.appendChild(btn);
    scrollToBottom();
  });
}

// --- Project Name Generator ---
function generateProjectName(themeIdx) {
  const prefixes = ["Cosmic", "Based", "Degen", "Pixel", "Quantum", "Shadow", "Neon", "Astral", "Cyber", "Omega"];
  const suffixes = [
    ["Apes", "Primates", "Chimps", "Gorillaz"],
    ["Penguins", "Pinguins", "Waddles", "Flippers"],
    ["Visions", "Frames", "Canvases", "Pixels"],
    ["Lords", "Chads", "Frens", "Wojaks"]
  ];
  const p = prefixes[Math.floor(Math.random() * prefixes.length)];
  const s = suffixes[themeIdx][Math.floor(Math.random() * suffixes[themeIdx].length)];
  return p + ' ' + s;
}

// --- RNG ---
function chance(pct) { return Math.random() * 100 < pct; }

// --- Profile Card ---
function showProfile() {
  const entry = addEntry();
  const card = document.createElement('div');
  card.className = 'profile-card';
  card.innerHTML = `
    <h3>// Founder Profile</h3>
    <div class="profile-row"><span class="label">Project:</span><span class="value">${gs.project}</span></div>
    <div class="profile-row"><span class="label">Role:</span><span class="value">De-Rugger</span></div>
    <div class="profile-row"><span class="label">Community Hope:</span><span class="value">${gs.stats.hope}%</span></div>
    <div class="profile-row"><span class="label">Burnout:</span><span class="value">${gs.stats.burnout}%</span></div>
    <div class="profile-row"><span class="label">Treasury:</span><span class="value">${gs.stats.treasury.toFixed(2)} SOL</span></div>
    <div class="profile-row"><span class="label">Your Wallet:</span><span class="value">${gs.stats.wallet.toFixed(2)} SOL</span></div>
    <div class="profile-row"><span class="label">Holders:</span><span class="value">${gs.stats.holders}</span></div>
    <div class="profile-row"><span class="label">Trust:</span><span class="value">${gs.stats.trust}</span></div>
    <div class="profile-row"><span class="label">Hype:</span><span class="value">${gs.stats.hype}</span></div>
  `;
  entry.appendChild(card);
  scrollToBottom();
}

// --- End Screen ---
// ============================================================
// GAME FLOW
// ============================================================

async function startGame() {
  // --- TITLE ---
  content.innerHTML = '';
  const titleDiv = document.createElement('div');
  titleDiv.id = 'title-screen';
  titleDiv.innerHTML = `
    <h1>RUGGED!</h1>
    <div class="subtitle">A Web3 De-Rug Strategy Simulator</div>
  `;
  content.appendChild(titleDiv);

  const startBtn = document.createElement('button');
  startBtn.className = 'btn btn-start';
  startBtn.textContent = 'START';
  startBtn.onclick = () => {
    playClick();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    startBtn.disabled = true;
    runPrologue();
  };
  titleDiv.appendChild(startBtn);
  scrollToBottom();
}

async function runPrologue() {
  content.innerHTML = '';
  gs.phase = 'prologue';

  // Q1
  await showNarrative("Before the rug, there was a project.\nWhat kind of project were you holding?");
  const q1 = await showDecision("Choose your project", [
    { label: "Degen Apes", desc: "10K PFP collection. Floor was 2 SOL at peak." },
    { label: "Pixel Penguins", desc: "Cute art, strong community vibes, merch potential." },
    { label: "Generative Art", desc: "On-chain SVG. The art actually slaps." },
    { label: "Meme Lords", desc: "Started as a joke. Accidentally built a cult." }
  ]);
  const themes = ['apes', 'penguins', 'art', 'meme'];
  gs.theme = themes[q1];
  gs.project = generateProjectName(q1);
  dimPrevious();

  await delay(400);
  await showNarrative(`${gs.project}. That was the name.\nYou remember the mint day like it was yesterday.`);
  await delay(600);

  // Q2
  await showNarrative("How deep did you ape in?");
  const q2 = await showDecision("Your exposure level", [
    { label: "Light Dip (1 NFT)", desc: "Wallet: 0.5 SOL. Low trauma. Nobody knows you." },
    { label: "Medium Ape (5 NFTs)", desc: "Wallet: 0.2 SOL. Medium trauma. Recognized holder." },
    { label: "Full Degen (20+ NFTs)", desc: "Wallet: 0.05 SOL. High trauma. Diamond hands legend. +10 rep." }
  ]);
  gs.stats.treasury = 0.3;
  if (q2 === 0) {
    gs.stats.wallet = 0.5; gs.stats.trauma = 'low';
    gs.stats.burnout = 5;
  } else if (q2 === 1) {
    gs.stats.wallet = 0.2; gs.stats.trauma = 'medium';
    gs.stats.burnout = 15; gs.stats.trust += 5;
  } else {
    gs.stats.wallet = 0.05; gs.stats.trauma = 'high';
    gs.stats.burnout = 20; gs.stats.rep += 10; gs.stats.trust += 10;
  }
  dimPrevious();
  await delay(400);

  // Q3
  await showNarrative("Every builder has a voice on CT.\nWhat's yours?");
  const q3 = await showDecision("Your CT style", [
    { label: "Memelord", desc: "You communicate in images. Engagement is chaotic but viral." },
    { label: "Serious Founder", desc: "Threads, roadmaps, transparency reports." },
    { label: "Spaces Warrior", desc: "You live on X Spaces. Your voice is your weapon." }
  ]);
  if (q3 === 0) gs.stats.socialPower += 15;
  else if (q3 === 1) gs.stats.trust += 15;
  else gs.stats.hype += 15;
  dimPrevious();
  await delay(400);

  // Q4
  await showNarrative("The floor is tanking. Paperhands are selling.\nWhy do you still believe?");
  const q4 = await showDecision("Your conviction", [
    { label: "The Art Slaps", desc: "The collection is genuinely good." },
    { label: "The Community", desc: "These people are real. The vibes are real." },
    { label: "Hidden Utility", desc: "There's something in the smart contract nobody noticed." },
    { label: "Pure Spite", desc: "I refuse to let some kid win." }
  ]);
  if (q4 === 0) gs.stats.hopeBuffer += 10;
  else if (q4 === 1) gs.stats.hopeBuffer += 15;
  else if (q4 === 2) gs.stats.mysteryBonus = true;
  else gs.stats.burnoutResist += 10;

  // Set starting hope
  gs.stats.hope = 40 + gs.stats.hopeBuffer;

  dimPrevious();
  await delay(800);
  saveGame();
  await runRugMoment();
}

async function runRugMoment() {
  gs.phase = 'rugmoment';
  setTicker('chaos');
  content.innerHTML = '';

  await showLines([
    `Day 47 of holding ${gs.project}...`,
    "The Discord is quiet. Too quiet.",
    "You check the treasury wallet.",
    "0.00 SOL",
    "The dev's Twitter: deleted.",
    "The website: 404.",

  await showNarrative("MONTH 6", 15);
  await delay(300);
  await showNarrative("Six months. " + gs.project + " is still alive. That alone puts it in the top 5% of rugged projects.\n\nBut 'alive' and 'thriving' are different things. The community is smaller now — the tourists left. What remains is either a cult or a corpse. Your choice.", 20);
  await delay(400);

  const l3 = await showDecision("Sustainable Vibes or Utility Push?", [
    { label: "Build real utility — staking, merch, partnerships", desc: "Go full startup mode. Treasury investment. High risk, high reward." },
    { label: "Embrace the cult — vibes, art, community", desc: "Small but loyal. Sustainable. The Cult Classic path." },
    { label: "Pivot entirely — rebrand and relaunch", desc: "Kill the old name. Start fresh with the same community. Bold." },
    { label: "Let it be — whatever happens, happens", desc: "Acceptance. The project will find its own level." }
  ]);

  entry = addEntry();
  if (l3 === 0) {
    if (gs.stats.treasury > 3 && gs.stats.hope > 50) {
      await showNarrative("You go all in. Staking goes live. Merch store opens. A partnership with a mid-tier Solana project drops. The floor responds — slowly at first, then all at once.\n\n" + gs.project + " isn't a meme anymore. It's infrastructure.", 20);
      changes = applyStats({ hope: 25, trust: 20, hype: 15, treasury: -2 });
      await delay(800);
      showEndingScreen('phoenix');
      return;
    } else {
      await showNarrative("You try to build utility on fumes. The staking contract is buggy. The merch store gets three orders. The partnership falls through.\n\nYou spent the last of the treasury on a vision the market wasn't ready for.", 20);
      changes = applyStats({ treasury: -2, hope: -15, burnout: 15 });
    }
  } else if (l3 === 1) {
    await showNarrative("You stop trying to moon. You start trying to matter.\n\nWeekly art drops. Community calls every Thursday. A small but fierce group of holders who genuinely like each other. The floor is low but stable. Nobody's selling because nobody wants to leave.\n\n" + gs.project + " becomes the project people point to and say: 'that's what community actually looks like.'", 20);
    changes = applyStats({ hope: 10, trust: 15, burnout: -10 });
    await delay(800);
    showEndingScreen('cult_classic');
    return;
  } else if (l3 === 2) {
    await showNarrative("You kill " + gs.project + ". The name. The art. The Discord channel names. Everything.\n\nFrom the ashes, a new project rises. Same people. Same wallets. New identity.\n\nSome holders mourn the old name. Others are energized. The floor resets to zero. The community doesn't.", 20);
    changes = applyStats({ hope: 5, hype: 15, trust: -10 });
    await delay(800);
    showEndingScreen('phoenix');
    return;
  } else {
    await showNarrative("You let go. Whatever happens to " + gs.project + " will happen on its own terms. You check in once a week. Then once a month.\n\nThe project finds its level — a quiet corner of Solana where 30 wallets hold forever and nothing ever changes.", 20);
    changes = applyStats({ burnout: -20 });
    await delay(800);
    showEndingScreen('cult_classic');
    return;
  }
  showStatChanges(changes, entry);
  gs.history.push({ time: 'L3', choice: l3 });
  saveGame();

  dimPrevious();
  await delay(800);

  // If we got here without an ending, determine one from stats
  if (gs.stats.hope >= 60 && gs.stats.trust >= 50) {
    showEndingScreen('phoenix');
  } else if (gs.stats.hope >= 30) {
    showEndingScreen('cult_classic');
  } else {
    showEndingScreen('slow_fade');
  }
}

// ============================================================
// ENDINGS
// ============================================================

function showEndingScreen(ending) {
  const endings = {
    phoenix: {
      title: 'PHOENIX SUCCESS',
      desc: `${gs.project} rose from the ashes. Floor mooned. Community thrived. You became a legend on CT — the de-rugger who actually made it.\n\nThey'll write threads about this one.`,
      color: '#2ecc40'
    },
    cult_classic: {
      title: 'CULT CLASSIC',
      desc: `${gs.project} never mooned. But it never died either. A small, loyal community holds forever. The art matters. The vibes are real.\n\nNot every success story needs a chart.`,
      color: '#e8e0d0'
    },
    burnout_ghost: {
      title: 'BURNOUT GHOST',
      desc: `You gave everything to ${gs.project}. Your time. Your money. Your sleep. Your sanity.\n\nIn the end, the project survived. You didn't.\n\nThe Discord still has your last message pinned: 'gm. big things coming this week.' That was six weeks ago.`,
      color: '#cc0000'
    },
    slow_fade: {
      title: 'SLOW FADE',
      desc: `No dramatic death. No rug. No scandal. ${gs.project} just... stopped.\n\nThe Discord went quiet. The floor went to zero. The last holder delisted without a word.\n\nThis is how most projects end. Not with a bang, but with an unread notification.`,
      color: '#a0998a'
    },
    hostile_takeover: {
      title: 'HOSTILE TAKEOVER',
      desc: `You trusted the wrong person. The whale — the one who said 'I'm still in' — took the keys and the treasury.\n\nCT calls it poetic: the de-rugger got rugged by his own co-lead. The memes write themselves.\n\nSomewhere, the original dev is laughing.`,
      color: '#cc0000'
    },
    new_rug_accusations: {
      title: 'NEW RUG ACCUSATIONS',
      desc: `You tried. God, you tried. But CT decided you were the villain. The screenshots. The accusations. The hashtag.\n\n'De-rugger is the new rugger' trends for a day. Your reputation is ash.\n\nThe irony is that you're still holding.`,
      color: '#cc0000'
    },
    irony: {
      title: 'THE IRONY',
      desc: `You revived ${gs.project}. You mooned the floor. You made the holders whole.\n\nAnd then, quietly, wallet by wallet, you sold everything.\n\nThe community didn't notice for three weeks. By then, you were gone. Just like the original dev.\n\nHistory doesn't repeat, but it rhymes.`,
      color: '#a0998a'
    }
  };

  const e = endings[ending] || endings.slow_fade;

  const entry = addEntry();
  entry.innerHTML = `
    <hr class="separator">
    <div class="end-title" style="color:${e.color}">${e.title}</div>
    <div class="end-subtitle" style="color:var(--muted)">// ENDING UNLOCKED</div>
    <div style="margin:16px 0;line-height:1.7;white-space:pre-wrap;">${e.desc}</div>
    <div class="profile-card">
      <h3>// Final Stats</h3>
      <div class="profile-row"><span class="label">Project:</span><span class="value">${gs.project}</span></div>
      <div class="profile-row"><span class="label">Community Hope:</span><span class="value">${Math.max(0,Math.min(100,gs.stats.hope))}%</span></div>
      <div class="profile-row"><span class="label">Burnout:</span><span class="value">${Math.max(0,Math.min(100,gs.stats.burnout))}%</span></div>
      <div class="profile-row"><span class="label">Treasury:</span><span class="value">${gs.stats.treasury.toFixed(2)} SOL</span></div>
      <div class="profile-row"><span class="label">Your Wallet:</span><span class="value">${gs.stats.wallet.toFixed(2)} SOL</span></div>
      <div class="profile-row"><span class="label">Holders:</span><span class="value">${gs.stats.holders}</span></div>
      <div class="profile-row"><span class="label">Trust:</span><span class="value">${gs.stats.trust}</span></div>
      <div class="profile-row"><span class="label">Hype:</span><span class="value">${gs.stats.hype}</span></div>
      <div class="profile-row"><span class="label">Decisions:</span><span class="value">${gs.history.length}</span></div>
      <div class="profile-row"><span class="label">Ending:</span><span class="value" style="color:${e.color}">${e.title}</span></div>
    </div>
  `;

  const restartBtn = document.createElement('button');
  restartBtn.className = 'btn btn-start';
  restartBtn.style.marginTop = '24px';
  restartBtn.textContent = 'PLAY AGAIN';
  restartBtn.onclick = () => {
    playClick();
    localStorage.removeItem('rugged_save');
    location.reload();
  };
  entry.appendChild(restartBtn);

  setTicker('general');
  scrollToBottom();
}

// --- Boot ---
startGame();
</script>
</body>
</html>
